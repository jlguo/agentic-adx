worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zone: 10000 req/s burst
    limit_req_zone $binary_remote_addr zone=adx_limit:10m rate=10000r/s;

    server {
        listen 80;

        # Internal health check (no rate limit)
        location /health-nginx {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ADX health check
        location /health {
            proxy_pass http://adx:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Bid endpoint — rate limited
        location /bid {
            limit_req zone=adx_limit burst=2000 nodelay;
            proxy_pass http://adx:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts for RTB (tight)
            proxy_connect_timeout 100ms;
            proxy_send_timeout 100ms;
            proxy_read_timeout 100ms;
        }
    }
}
