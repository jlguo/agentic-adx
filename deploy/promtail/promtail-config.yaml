server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: adx-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: adx
          __path__: /var/log/adx/*.log
    pipeline_stages:
      - docker: {}
      - regex:
          expression: '^(?P<timestamp>\S+) (?P<level>\S+)\s+(?P<message>.*)$'
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339
