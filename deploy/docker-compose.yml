version: "3.8"

services:
  # ============================================================
  # Redis 7.2 — budget, frequency capping, blacklists, bid cache
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: adx-redis
    ports:
      - "6379:6379"
    networks:
      - adx-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # MySQL 8.0 — ad campaigns, creatives, accounts, configuration
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: adx-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: adx
      MYSQL_USER: adx
      MYSQL_PASSWORD: adx_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - adx-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # ClickHouse — analytics, A/B test metrics, reporting
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: adx-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: adx_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./schema/clickhouse_init.sql:/docker-entrypoint-initdb.d/clickhouse_init.sql
    networks:
      - adx-net
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # Qdrant — semantic vector recall for ad candidate retrieval
  # ============================================================
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: adx-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - adx-net
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333; echo -e 'GET /healthz HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3; head -1 <&3 | grep -q 200"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # Kafka (KRaft mode, no ZooKeeper) — event streaming
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: adx-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      CLUSTER_ID: "APoHbsfDRCKlFlYo1F6Z5A"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CREATE_TOPICS: "ad_impressions:1:1,ad_clicks:1:1,ad_conversions:1:1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - adx-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================================================
  # Nginx — reverse proxy, rate limiting, traffic gateway
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: adx-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - adx-net
    depends_on:
      - adx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health-nginx"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # Prometheus — metrics collection
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: adx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - adx-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # Grafana — dashboards, visualization
  # ============================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: adx-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - adx-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # Loki — log aggregation
  # ============================================================
  loki:
    image: grafana/loki:2.9.5
    container_name: adx-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    networks:
      - adx-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # Promtail — log shipper (ADX logs → Loki)
  # ============================================================
  promtail:
    image: grafana/promtail:2.9.5
    container_name: adx-promtail
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - adx_logs:/var/log/adx
    networks:
      - adx-net
    depends_on:
      - loki
    restart: unless-stopped

  # ============================================================
  # Jaeger — distributed tracing
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: adx-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    user: root
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger_data:/badger
    networks:
      - adx-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:16686/"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # ADX Core — Go application (built separately, image placeholder)
  # ============================================================
  adx:
    build:
      context: ../adx
      dockerfile: Dockerfile
    container_name: adx-core
    ports:
      - "8081:8080"
      - "9091:9091"
    environment:
      REDIS_ADDR: redis:6379
      MYSQL_DSN: adx:adx_pass@tcp(mysql:3306)/adx?parseTime=true
      QDRANT_ADDR: qdrant:6333
      KAFKA_ADDR: kafka:9092
      JAEGER_ADDR: http://jaeger:14268/api/traces
      GPR_ADDR: llama:8080
    volumes:
      - adx_logs:/var/log/adx
    networks:
      - adx-net
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ============================================================
  # Data Loop - Kafka consumer + training trigger (Layer 4)
  # ============================================================
  data-loop:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.data-loop
    container_name: adx-data-loop
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MYSQL_HOST: mysql
      MYSQL_USER: adx
      MYSQL_PASS: adx_pass
      QDRANT_URL: http://qdrant:6333
      SAMPLE_THRESHOLD: "500"
    volumes:
      - ../data:/app/data
    networks:
      - adx-net
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # Bidding Agent - hourly ROAS optimization (Layer 5 side-path)
  # ============================================================
  bidding-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agents
    container_name: adx-bidding-agent
    command: sh -c "while true; do python -m agents.bidding_agent --roas-target 3.0 --epsilon 0.1; sleep 3600; done"
    environment:
      LLM_ENDPOINT: http://llama:8080/v1
      CLICKHOUSE_URL: http://default:clickhouse@clickhouse:8123
      REDIS_ADDR: redis:6379
    networks:
      - adx-net
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # llama.cpp Server - OpenAI-compatible API for agent LLM
  # ============================================================
  llama:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.llama
    container_name: adx-llama
    volumes:
      - ../models/qwen2-1.5b:/models:ro
    networks:
      - adx-net
    restart: unless-stopped

  # ============================================================
  # GPR CPU Scorer - batch-scores all active creatives (PyTorch CPU)
  # ============================================================
  gpr-scorer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gpr-scorer
    container_name: adx-gpr-scorer
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: adx
      MYSQL_PASS: adx_pass
      MYSQL_DB: adx
      REDIS_ADDR: redis:6379
      SCORE_INTERVAL: "30"
    volumes:
      - hf_cache:/root/.cache/huggingface
    networks:
      - adx-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  adx-net:
    driver: bridge

volumes:
  mysql_data:
  clickhouse_data:
  qdrant_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  loki_data:
  jaeger_data:
  adx_logs:
  hf_cache:
